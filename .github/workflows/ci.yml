name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tax-engine:
    name: Tax engine (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/tax-engine" ruff pytest
      - name: Lint
        run: ruff check packages/tax-engine
      - name: Test
        run: pytest packages/tax-engine/tests -q

  api:
    name: API (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/tax-engine" -e "apps/api[dev]"
      - name: Lint
        run: ruff check apps/api
      - name: Test (unit — integration tests need PostgreSQL and are deselected)
        working-directory: apps/api
        run: pytest -q

  web:
    name: Web (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  smoke:
    name: Docker smoke test (fake LLM)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run smoke test
        run: bash scripts/smoke_test.sh

  publish:
    name: Publish images (GHCR)
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [tax-engine, api, web, smoke]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/vinoththecool7-netizen/kara-api:latest
            ghcr.io/vinoththecool7-netizen/kara-api:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:8000
            NEXT_PUBLIC_SITE_URL=http://localhost:3000
            INTERNAL_API_URL=http://api:8000
          tags: |
            ghcr.io/vinoththecool7-netizen/kara-web:latest
            ghcr.io/vinoththecool7-netizen/kara-web:sha-${{ steps.sha.outputs.short }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
