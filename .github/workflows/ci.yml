name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  tax-engine:
    name: Tax engine (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/tax-engine" ruff pytest
      - name: Lint
        run: ruff check packages/tax-engine
      - name: Test
        run: pytest packages/tax-engine/tests -q

  api:
    name: API (Python 3.12)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "packages/tax-engine" -e "apps/api[dev]"
      - name: Lint
        run: ruff check apps/api
      - name: Test (unit — integration tests need PostgreSQL and are deselected)
        working-directory: apps/api
        run: pytest -q

  web:
    name: Web (Node 22)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npx tsc --noEmit
      - name: Test
        run: npm test
      - name: Build
        run: npm run build
