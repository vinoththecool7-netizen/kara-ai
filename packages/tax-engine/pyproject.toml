[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "kara-tax-engine"
version = "0.1.0"
description = "Deterministic Indian income tax computation engine — FY 2025-26 ready"
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Kara Contributors" },
]
keywords = ["tax", "india", "income-tax", "finance", "calculator"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Financial and Insurance Industry",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "ruff>=0.4",
]

[project.urls]
Homepage = "https://github.com/vinoththecool7-netizen/kara-ai/tree/master/packages/tax-engine"
Documentation = "https://github.com/vinoththecool7-netizen/kara-ai/tree/master/docs"
Repository = "https://github.com/vinoththecool7-netizen/kara-ai"
Issues = "https://github.com/vinoththecool7-netizen/kara-ai/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/kara_tax_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-v --tb=short"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]
# UP042 (StrEnum) deferred: changing the str-Enum bases is a public API change.
ignore = ["UP042"]

[tool.ruff.lint.per-file-ignores]
# Test names encode rupee amounts and section codes (e.g. _at_5L, _80C).
"tests/*" = ["N802", "E501"]
